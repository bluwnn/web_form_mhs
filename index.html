<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial scale=1.0">
    <title>Data Mahasiwa</title>

    <!--ZALDY BUAT FILE style.css BARU BUAT STYLING-->
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <main class="container">

      <header class="header">
        <h1>Form Data Mahasiswa</h1>
        <p>Inpit dan kelola data mahasiswa</p>
      </header>

      <!--TEMPAT FORM-->
      <section class="form-section">
        <form id="formMahasiswa" class="form">

          <div class="form-group">
            <label for="nim">NIM</label>
            <input type="text" id="nim" name="nim" placeholder="Masukkan NIM" required>
          </div>

          <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama" required>
          </div>

          <div class="form-group">
            <label for="alamat">Alamat</label>
              <textarea id="alamat" name="alamat" rows="3" placeholder="Masukkan alamat"></textarea>
          </div>

          <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="radio-group">
              <label><input type="radio" name="jk" value="Pria"> Pria</label>
              <label><input type="radio" name="jk" value="Wanita"> Wanita</label>
              <label><input type="radio" name="jk" value="Lainnya"> Lainnya</label>
            </div>
          </div>

          <div class="form-group">
            <label for="ttl">Tanggal Lahir</label>
            <input type="date" id="ttl" name="ttl">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
          </div>

          <div class="form-actions">
            <button type="submit" id="btnSubmit">Submit</button>
            <button type="reset">Reset</button>
          </div>
      
        </form>
      </section>
      
    </main>
  </body>
</html>
